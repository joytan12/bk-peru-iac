name: Pull Request Checks

on:
  pull_request:

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            lib/
            bin/

  validate:
    name: Code Validation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: |
          echo "Running code validation..."
          npm run build
          echo "âœ… Code validation passed"

  cdk-synth-dev:
    name: CDK Synth (Development)
    needs: validate
      if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    environment: development
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEV_OIDC_ROLE_ARN || secrets.DEV_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.DEV_REGION || secrets.DEV_REGION || 'us-east-1' }}
      - name: CDK Synth (Development)
        run: |
          npm install -g aws-cdk
          echo "ðŸ”¨ Synthesizing CloudFormation template (Development)..."
          ENVIRONMENT=dev cdk synth
        env:
          DEV_ACCOUNT_ID: ${{ vars.DEV_ACCOUNT_ID || secrets.DEV_ACCOUNT_ID }}
          DEV_REGION: ${{ vars.DEV_REGION || secrets.DEV_REGION }}

  cdk-synth-prod:
    name: CDK Synth (Production)
    needs: validate
      if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PROD_OIDC_ROLE_ARN || secrets.PROD_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.PROD_REGION || secrets.PROD_REGION || 'us-east-1' }}
      - name: CDK Synth (Production)
        run: |
          npm install -g aws-cdk
          echo "ðŸ”¨ Synthesizing CloudFormation template (Production)..."
          ENVIRONMENT=prod cdk synth
        env:
          PROD_ACCOUNT_ID: ${{ vars.PROD_ACCOUNT_ID || secrets.PROD_ACCOUNT_ID }}
          PROD_REGION: ${{ vars.PROD_REGION || secrets.PROD_REGION }}

  cdk-diff-dev:
    name: CDK Diff (Development)
    needs: [cdk-synth-dev, cdk-synth-prod]
      if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    environment: development
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEV_OIDC_ROLE_ARN || secrets.DEV_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.DEV_REGION || secrets.DEV_REGION || 'us-east-1' }}
      - name: CDK Diff (Development)
        run: |
          npm install -g aws-cdk
          echo "ðŸ“Š Showing changes for DEVELOPMENT environment..."
          ENVIRONMENT=dev cdk diff || true
          echo ""
          echo "âš ï¸  Review the changes above before merging"
        env:
          DEV_ACCOUNT_ID: ${{ vars.DEV_ACCOUNT_ID || secrets.DEV_ACCOUNT_ID }}
          DEV_REGION: ${{ vars.DEV_REGION || secrets.DEV_REGION }}

  cdk-diff-prod:
    name: CDK Diff (Production)
    needs: [cdk-synth-dev, cdk-synth-prod]
      if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PROD_OIDC_ROLE_ARN || secrets.PROD_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.PROD_REGION || secrets.PROD_REGION || 'us-east-1' }}
      - name: CDK Diff (Production)
        run: |
          npm install -g aws-cdk
          echo "ðŸ“Š Showing changes for PRODUCTION environment..."
          ENVIRONMENT=prod cdk diff || true
          echo ""
          echo "âš ï¸  Review the changes above before merging"
        env:
          PROD_ACCOUNT_ID: ${{ vars.PROD_ACCOUNT_ID || secrets.PROD_ACCOUNT_ID }}
          PROD_REGION: ${{ vars.PROD_REGION || secrets.PROD_REGION }}

  validacion-ticket:
    name: Validacion ticket Jira
    needs: [cdk-diff-dev, cdk-diff-prod]
      if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate Jira Ticket
        run: |
          VALIDACION=$(curl -s -u "$JIRA_USER:$BIT" "$TAG/v1.0.0/validacion-ticket.sh")
          if [ -z "$VALIDACION" ]; then
            echo "Error con las credenciales, revisar las variables de repositorio."
            exit 1
          fi
          curl -s -u "$JIRA_USER:$BIT" "$TAG/v1.0.0/validacion-ticket.sh" -o validacion.sh
          chmod +x validacion.sh
          ./validacion.sh
        env:
          JIRA_USER: ${{ secrets.JIRA_USER }}
          BIT: ${{ secrets.BIT_TOKEN }}
          TAG: ${{ secrets.URL_TAG }}

