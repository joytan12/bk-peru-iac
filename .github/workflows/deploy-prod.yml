name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  validate:
    name: Code Validation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: |
          echo "Running code validation..."
          npm run build
          echo "✅ Code validation passed"

  cdk-synth-prod:
    name: CDK Synth (Production)
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: ${{ vars.PROD_OIDC_ROLE_ARN || secrets.PROD_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.PROD_REGION || secrets.PROD_REGION || 'us-east-1' }}
      - name: CDK Synth (Production)
        run: |
          npm install -g aws-cdk
          echo "🔨 Synthesizing CloudFormation template (Production)..."
          ENVIRONMENT=prod cdk synth
        env:
            PROD_ACCOUNT_ID: ${{ vars.PROD_ACCOUNT_ID || secrets.PROD_ACCOUNT_ID }}
            PROD_REGION: ${{ vars.PROD_REGION || secrets.PROD_REGION }}

  cdk-diff-prod:
    name: CDK Diff (Production)
    needs: cdk-synth-prod
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: ${{ vars.PROD_OIDC_ROLE_ARN || secrets.PROD_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.PROD_REGION || secrets.PROD_REGION || 'us-east-1' }}
      - name: CDK Diff (Production)
        run: |
          npm install -g aws-cdk
          echo "📊 Showing changes for PRODUCTION environment..."
          ENVIRONMENT=prod cdk diff || true
          echo ""
          echo "⚠️  Review the changes above before merging"
        env:
            PROD_ACCOUNT_ID: ${{ vars.PROD_ACCOUNT_ID || secrets.PROD_ACCOUNT_ID }}
            PROD_REGION: ${{ vars.PROD_REGION || secrets.PROD_REGION }}

  deploy-prod:
    name: Deploy to Production
    needs: cdk-diff-prod
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: ${{ vars.PROD_OIDC_ROLE_ARN || secrets.PROD_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.PROD_REGION || secrets.PROD_REGION || 'us-east-1' }}
      - name: Deploy to Production
        run: |
          npm install -g aws-cdk
          echo "🚀 Deploying to PRODUCTION environment..."
          ENVIRONMENT=prod cdk deploy --require-approval never
          echo ""
          echo "✅ Deployment to production completed successfully"
        env:
            PROD_ACCOUNT_ID: ${{ vars.PROD_ACCOUNT_ID || secrets.PROD_ACCOUNT_ID }}
            PROD_REGION: ${{ vars.PROD_REGION || secrets.PROD_REGION }}

  cambio-ticket:
    name: Cambio estado ticket Jira
    needs: deploy-prod
    runs-on: ubuntu-latest
    steps:
      - name: Change Jira Ticket Status
        run: |
          VALIDACION=$(curl -s -u "$JIRA_USER:$BIT" "$TAG/v1.0.0/validacion-ticket.sh")
          if [ -z "$VALIDACION" ]; then
            echo "Error con las credenciales, revisar las variables de repositorio."
            exit 1
          fi
          curl -s -u "$JIRA_USER:$BIT" "$TAG/v1.0.0/cambio-ticket.sh" -o cambio.sh
          chmod +x cambio.sh
          ./cambio.sh
        env:
          JIRA_USER: ${{ secrets.JIRA_USER }}
          BIT: ${{ secrets.BIT_TOKEN }}
          TAG: ${{ secrets.URL_TAG }}
